<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="100%" height="100%">
  <defs>
    <!-- Quina (Small white shield) -->
    <path id="quina" d="M -5,-6 L 5,-6 L 5,3 C 5,7 0,11 0,11 C 0,11 -5,7 -5,3 Z" fill="#ffffff" />
  </defs>
  
  <g transform="translate(150, 45)">
    <!-- Main Blue Shield -->
    <path d="M -30,-40 L 30,-40 C 35,-40 37,15 0,50 C -37,15 -35,-40 -30,-40 Z" fill="#0F75A3" />
    
    <!-- 5 Quinas (Cross formation) -->
    <!-- Center -->
    <use href="#quina" x="0" y="5" />
    <!-- Top -->
    <use href="#quina" x="0" y="-13" />
    <!-- Bottom -->
    <use href="#quina" x="0" y="23" />
    <!-- Left -->
    <use href="#quina" x="-18" y="5" />
    <!-- Right -->
    <use href="#quina" x="18" y="5" />
  </g>
  
  <!-- Text -->
  <text x="150" y="120" font-family="'Times New Roman', Times, serif" font-size="40" font-weight="normal" fill="#000000" text-anchor="middle">Portucale</text>
  <text x="150" y="140" font-family="'Arial', sans-serif" font-size="13" fill="#555555" text-anchor="middle">Sabors de Portugal</text>
</svg>
